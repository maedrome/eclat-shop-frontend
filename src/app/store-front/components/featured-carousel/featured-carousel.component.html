<section class="mb-12">
  <div class="relative">
    <div class="swiper" #swiperFeatured>
      <div class="swiper-wrapper select-none">
        @for(product of products(); track product.id) {
          <div class="swiper-slide">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-12 md:items-center">
              <a [routerLink]="['/product', product.slug]" class="block overflow-hidden">
                <img
                  class="w-full aspect-[3/2] md:aspect-auto xl:aspect-[3/2] object-cover"
                  [src]="product.images | productImage"
                  [alt]="product.title" />
              </a>
              <div class="flex flex-col">
                <span class="text-xs w-fit pb-3 mb-5 uppercase tracking-widest text-neutral/50 font-montserrat border-b border-base-content/20">{{ product.gender }}</span>
                <a [routerLink]="['/product', product.slug]"
                   class="text-2xl md:text-3xl lg:text-4xl font-montserrat leading-tight hover:text-primary transition-colors duration-300 block">
                  {{ product.title }}
                </a>
                <span class="text-2xl md:text-3xl font-montserrat mt-2">${{ product.price.toFixed(2) }}</span>
                <p class="mt-4 text-neutral/60 line-clamp-2 leading-relaxed">{{ product.description }}</p>
                @if(product.sizes.length) {
                  <div class="flex gap-2 mt-4 flex-wrap">
                    @for(size of product.sizes; track size) {
                      <span class="text-xs px-2.5 py-1 border border-base-300 rounded-xs font-montserrat">{{ size }}</span>
                    }
                  </div>
                }
                <a [routerLink]="['/product', product.slug]"
                   class="max-md:hidden mt-8 text-sm font-montserrat uppercase bg-base-200 hover:bg-base-300 rounded-full py-2 px-5 tracking-widest transition-colors duration-300 w-fit">
                  Shop Now
                </a>
              </div>
            </div>
          </div>
        }
      </div>
    </div>

    <!-- Navigation -->
    <div class="flex justify-end md:absolute md:bottom-0 md:right-0 z-10 items-center gap-3 mt-4 md:mt-0 select-none">
      <button class="featured-prev p-1.5 hover:text-accent transition-colors duration-300 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span class="text-sm font-montserrat tabular-nums">
        <span class="featured-current">1</span>
        <span class="text-neutral/40"> / {{ products().length }}</span>
      </span>
      <button class="featured-next p-1.5 hover:text-accent transition-colors duration-300 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>
</section>
