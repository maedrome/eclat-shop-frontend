<div class="relative h-full flex flex-col-reverse sm:flex-row items-center gap-1.5 animate-fadeIn">
    <div class="relative sm:min-w-[50px] flex max-sm:flex-row sm:flex-col items-center gap-1">
        <!-- Prev arrow -->
        <button class="thumb-nav shrink-0 flex items-center justify-center cursor-pointer text-base-content/70 hover:text-base-content transition-colors duration-200" #thumbPrev>
            <svg class="w-5 h-5 max-sm:-rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
        </button>
        <!-- Thumbs swiper -->
        <div class="overflow-hidden">
            <div class="swiper max-w-[216px]! sm:w-[50px]! sm:max-h-[216px]! overflow-visible!" [class]="{'hidden!': images().length < 1}" #swiperThumbDiv thumbsSlider="">
                <div class="swiper-wrapper sm:justify-center items-center gap-1">
                    @for(image of images(); track image){
                        <div class="swiper-slide w-[50px]! h-[50px]! overflow-hidden border border-base-content/10 cursor-pointer transition-colors duration-200">
                            <img [src]="image | productImage" class="block w-full h-full object-cover">
                        </div>
                    }
                </div>
            </div>
        </div>
        <!-- Next arrow -->
        <button class="thumb-nav shrink-0 flex items-center justify-center cursor-pointer text-base-content/70 hover:text-base-content transition-colors duration-200" #thumbNext>
            <svg class="w-5 h-5 max-sm:-rotate-90" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
    </div>
    <div class="swiper w-full!" #swiperDiv>
        <div class="swiper-wrapper">
            @for(image of images(); track image){
                <div class="swiper-slide">
                    <img [src]="image | productImage" class="block aspect-square w-full h-full object-contain!">
                </div>
            }@empty {
                <div class="swiper-slide">
                    <img [src]="null | productImage" class="block aspect-square w-full h-full object-contain!">
                </div>
            }
        </div>
    </div>
</div>
