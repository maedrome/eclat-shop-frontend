<!-- Back link -->
<a
  routerLink="/admin/products"
  class="inline-flex items-center gap-1.5 text-xs font-montserrat uppercase tracking-widest text-neutral/50 hover:text-accent transition-colors duration-200 select-none"
>
  <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  Back to Products
</a>

<h1 class="text-3xl md:text-4xl font-montserrat select-none leading-tight mt-5 mb-8">{{ product().title }}</h1>

<form class="grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-14" [formGroup]="productForm" autocomplete="off" (ngSubmit)="onSubmit()">

  <!-- Left column: Details -->
  <div class="flex flex-col gap-5">
    <h2 class="text-lg font-montserrat uppercase tracking-widest select-none">Details</h2>

    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Title</label>
      <input
        type="text"
        placeholder="Product title"
        class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
        formControlName="title"
      />
      <form-error-label [control]="productForm.get('title')!"></form-error-label>
    </div>

    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Slug</label>
      <input
        type="text"
        placeholder="product-slug"
        class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
        formControlName="slug"
      />
      <form-error-label [control]="productForm.get('slug')!"></form-error-label>
    </div>

    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Description</label>
      <textarea
        placeholder="Product description"
        rows="5"
        class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30 resize-none [scrollbar-width:thin] [scrollbar-color:var(--color-base-300)_transparent]"
        formControlName="description"
      ></textarea>
      <form-error-label [control]="productForm.get('description')!"></form-error-label>
    </div>

    <h2 class="text-lg font-montserrat uppercase tracking-widest select-none mt-3">Pricing & Stock</h2>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Price</label>
        <input
          type="number"
          placeholder="0.00"
          class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
          formControlName="price"
        />
        <form-error-label [control]="productForm.get('price')!"></form-error-label>
      </div>
      <div>
        <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Stock</label>
        <input
          type="number"
          placeholder="0"
          class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
          formControlName="stock"
        />
        <form-error-label [control]="productForm.get('stock')!"></form-error-label>
      </div>
    </div>

    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block select-none">Tags</label>
      <input
        type="text"
        placeholder="shirt, cotton, summer"
        class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-base md:text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
        formControlName="tags"
      />
      <form-error-label [control]="productForm.get('tags')!"></form-error-label>
    </div>

    <h2 class="text-lg font-montserrat uppercase tracking-widest select-none mt-3">Classification</h2>

    <!-- Gender -->
    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-2.5 block select-none">Gender</label>
      <div class="flex flex-wrap gap-2">
        @for(gender of genders; track gender){
          <button
            type="button"
            class="px-4 py-2 text-xs font-montserrat uppercase tracking-widest border transition-all duration-200 select-none cursor-pointer"
            [class]="productForm.value.gender === gender
              ? 'border-base-content bg-base-content text-base-100'
              : 'border-base-content/15 text-neutral/60 hover:border-base-content/40 hover:text-base-content'"
            (click)="productForm.patchValue({gender: gender})"
          >{{ gender | i18nSelect:genderMap | titlecase }}</button>
        }
      </div>
    </div>

    <!-- Sizes -->
    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-2.5 block select-none">Sizes</label>
      <div class="flex flex-wrap gap-2">
        @for (size of sizes; track size) {
          <button
            type="button"
            class="min-w-[2.5rem] h-9 px-3 text-xs font-montserrat uppercase tracking-widest border transition-colors duration-200 select-none cursor-pointer"
            [class]="productForm.value.sizes?.includes(size)
              ? 'border-base-content bg-base-content text-base-100'
              : 'border-base-content/15 text-neutral/60 hover:border-base-content/40 hover:text-base-content'"
            (click)="toggleSize(size)"
          >{{ size }}</button>
        }
      </div>
    </div>
  </div>

  <!-- Right column: Images + Save -->
  <div class="flex flex-col gap-5">
    <div class="flex items-center justify-between">
      <h2 class="text-lg font-montserrat uppercase tracking-widest select-none">Images</h2>
      <button
        type="submit"
        class="inline-flex items-center gap-2 text-sm font-montserrat uppercase tracking-widest bg-base-content text-base-100 hover:bg-primary px-5 py-2.5 transition-colors duration-300 select-none cursor-pointer"
      >
        Save
      </button>
    </div>

    <product-carousel [images]="imagesToCarousel()"></product-carousel>

    <div>
      <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-2 block select-none">Upload Images</label>
      <label class="flex items-center justify-center w-full border border-dashed border-base-content/20 hover:border-base-content/40 py-6 cursor-pointer transition-colors duration-300 group">
        <div class="flex flex-col items-center gap-2 select-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-neutral/30 group-hover:text-neutral/50 transition-colors duration-200"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          <span class="text-xs font-montserrat uppercase tracking-widest text-neutral/40 group-hover:text-neutral/60 transition-colors duration-200">Choose files</span>
        </div>
        <input
          type="file"
          multiple accept="image/*"
          class="hidden"
          (change)="onFilesChanged($event)"
        />
      </label>
    </div>

    @if(tempImages().length > 0){
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
        @for(image of tempImages(); track image){
          <img [src]="image" alt="Preview" class="w-full aspect-square object-cover bg-base-200 transition-opacity duration-300" loading="lazy" style="opacity: 0" (load)="$any($event.target).style.opacity = '1'">
        }
      </div>
    }
  </div>
</form>
