@if(productResource.isLoading()){
    <div class="flex flex-col items-center justify-center py-24 gap-3">
        <span class="loading loading-spinner loading-md text-neutral/30"></span>
        <p class="text-xs font-montserrat uppercase tracking-widest text-neutral/30 select-none">Loading product</p>
    </div>
}

@if(productResource.hasValue()){
    <product-details [product]="productResource.value()"></product-details>
}
