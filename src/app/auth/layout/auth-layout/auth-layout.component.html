<div class="min-h-screen flex">

  <!-- Left: Brand panel with hero image (hidden on mobile) -->
  <div class="hidden lg:flex lg:w-[45%] relative overflow-hidden">

    <!-- Hero image -->
    <img
      src="images/auth-hero.png"
      alt=""
      class="absolute inset-0 w-full h-full object-cover object-top lg:object-[50%_25%] transition-opacity duration-300"
      style="opacity: 0"
      (load)="$any($event.target).style.opacity = '1'"
    />

    <!-- Overlay — only darkens bottom half for tagline readability, top stays natural -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/35 via-black/15 via-80% to-black/10 "></div>

    <!-- Content over image -->
    <div class="relative z-10 flex flex-col p-10 xl:p-14 w-full h-full">

      <!-- Logo — sits on the natural light background of the image -->
      <a routerLink="/" class="text-2xl tracking-wide font-montserrat select-none block w-fit text-shadow-sm">
        <span class="text-base-content">Sukia </span> <span class="text-primary">| Store</span>
      </a>

      <!-- Tagline — positioned roughly 1/3 from top -->
      <div class="max-w-xs mt-[18vh]">
        <p class="text-4xl xl:text-5xl font-montserrat leading-tight text-base-content/95 text-shadow-sm">
          Wear What<br/>You Love.
        </p>
        <p class="text-base-content/60 text-shadow-sm mt-3">
          Curated styles designed for comfort and confidence.
        </p>
      </div>

      <!-- Copyright anchored at bottom -->
      <p class="mt-auto text-white/20 text-xs font-montserrat uppercase tracking-widest select-none text-shadow-sm">
        &copy; 2026 Sukia Store
      </p>

    </div>
  </div>

  <!-- Right: Form area -->
  <div class="flex-1 flex items-center justify-center px-6 py-8 lg:py-12 bg-base-100">
    <div class="w-full max-w-sm animate-fadeIn">

      <!-- Mobile logo (visible on < lg) -->
      <div class="lg:hidden mb-10 text-center">
        <a routerLink="/" class="text-3xl tracking-wide font-montserrat select-none">
          Sukia <span class="text-primary">| Store</span>
        </a>
      </div>

      <router-outlet></router-outlet>
    </div>
  </div>

</div>
