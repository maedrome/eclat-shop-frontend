<!-- Heading -->
<h1 class="text-4xl md:text-5xl font-montserrat leading-tight">Log In</h1>
<p class="text-neutral/60 mt-2 text-sm">Welcome back. Enter your credentials to continue.</p>

<!-- Form -->
<form class="mt-8 space-y-5" [formGroup]="myForm" (ngSubmit)="onSubmit()">

  <!-- Email -->
  <div>
    <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block">
      Email
    </label>
    <input
      type="email"
      formControlName="email"
      autocomplete="email"
      placeholder="you&#64;example.com"
      class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
    />
    @if (isValidField('email')) {
      <p class="text-error text-xs mt-1">{{ getFieldError('email') }}</p>
    }
  </div>

  <!-- Password -->
  <div>
    <label class="text-xs font-montserrat uppercase tracking-widest text-neutral/60 mb-1.5 block">
      Password
    </label>
    <input
      type="password"
      formControlName="password"
      autocomplete="current-password"
      placeholder="Enter your password"
      class="w-full border border-base-content/15 bg-transparent px-4 py-2.5 text-sm focus:border-base-content focus:outline-none transition-colors duration-300 placeholder:text-neutral/30"
    />
    @if (isValidField('password')) {
      <p class="text-error text-xs mt-1">{{ getFieldError('password') }}</p>
    }
  </div>

  <!-- Submit -->
  <button
    type="submit"
    class="w-full text-sm font-montserrat uppercase tracking-widest py-3 mt-3 bg-base-content text-base-100 hover:bg-primary transition-colors duration-300 cursor-pointer disabled:opacity-30 disabled:cursor-default"
  >
    Log In
  </button>

</form>

<!-- Register link -->
<div class="mt-6 flex items-center justify-between text-sm">
  <span class="text-neutral/50">Don't have an account?</span>
  <a
    [routerLink]="['/auth/register']"
    class="font-montserrat text-sm hover:text-accent transition-colors duration-300 underline underline-offset-2"
  >
    Create one here
  </a>
</div>

<!-- Error toast -->
@if (hasError()) {
  <div class="fixed bottom-8 right-8 animate-fadeIn px-5 py-3 border border-error/30 bg-base-100 text-error text-sm flex items-center gap-2.5 shadow-sm">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
    </svg>
    <span class="font-montserrat">Incorrect email or password.</span>
  </div>
}
