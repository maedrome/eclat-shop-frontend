<div class="flex justify-center items-center gap-1 select-none font-montserrat">
  <a
    class="p-2 transition-colors duration-300"
    [class]="hasPrevious() ? 'hover:text-accent cursor-pointer' : 'opacity-30 pointer-events-none'"
    [routerLink]="[]"
    [queryParams]="{page: previousPageNumber()}"
    queryParamsHandling="merge"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
  </a>

  @for(item of visiblePages(); track $index) {
    @if(isNumber(item)) {
      <a
        class="w-9 h-9 flex items-center justify-center text-sm transition-colors duration-300"
        [class]="item === currentPage() ? 'bg-base-200 rounded-full text-primary' : 'hover:text-accent cursor-pointer'"
        [routerLink]="[]"
        [queryParams]="{page: item}"
        queryParamsHandling="merge">
        {{item}}
      </a>
    }@else {
      <span class="w-9 h-9 flex items-center justify-center text-sm opacity-40">...</span>
    }
  }

  <a
    class="p-2 transition-colors duration-300"
    [class]="hasNext() ? 'hover:text-accent cursor-pointer' : 'opacity-30 pointer-events-none'"
    [routerLink]="[]"
    [queryParams]="{page: nextPageNumber()}"
    queryParamsHandling="merge">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
  </a>
</div>
